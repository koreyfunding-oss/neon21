<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="60" fill="#030712"/>
  <text x="10" y="44" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
        fill="#00eeff" filter="url(#glow)" letter-spacing="4">NEON</text>
  <text x="130" y="44" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
        fill="#ffb700" filter="url(#glow)" letter-spacing="2">21</text>
</svg>
